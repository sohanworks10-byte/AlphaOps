name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        working-directory: alphaops-agent

      - name: Install pkg
        run: npm install -g pkg

      - name: Build linux-x64 binary
        run: pkg agent.js --target node18-linux-x64 --output ../alphaops-agent-linux-amd64
        working-directory: alphaops-agent

      - name: Build linux-arm64 binary
        run: pkg agent.js --target node18-linux-arm64 --output ../alphaops-agent-linux-arm64
        working-directory: alphaops-agent

      - name: Make binaries executable
        run: |
          chmod +x alphaops-agent-linux-amd64
          chmod +x alphaops-agent-linux-arm64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            alphaops-agent-linux-amd64
            alphaops-agent-linux-arm64

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            alphaops-agent-linux-amd64
            alphaops-agent-linux-arm64
          body: |
            ## AlphaOps Agent ${{ github.ref_name }}
            Download the agent for your architecture:
            - **AMD64 (x64)**: [alphaops-agent-linux-amd64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/alphaops-agent-linux-amd64)
            - **ARM64**: [alphaops-agent-linux-arm64](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/alphaops-agent-linux-arm64)
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
